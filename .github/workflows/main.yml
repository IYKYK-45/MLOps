name: CI/CD to Docker Hub

# Trigger: Run this whenever code is pushed to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull the code from GitHub to the cloud runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Log in to Docker Hub using your secrets
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. Build the image and push it
    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Replace 'your-username' with your actual Docker Hub ID
        tags: your-username/my-mlops-app:latest
